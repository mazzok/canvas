version: "3.9"

networks:
  canvas-net:
    driver: bridge

services:
  canvas-mongodb:
    image: mongo:7
    container_name: canvas-mongodb
    networks:
      - canvas-net
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  canvas-app:
    image: ghcr.io/mazzok/canvas:latest
    container_name: canvas-app
    networks:
      - canvas-net
    ports:
      - "8080:8080"
    environment:
      QUARKUS_MONGODB_CONNECTION_STRING: mongodb://canvas-mongodb:27017
      QUARKUS_MONGODB_DATABASE: canvas
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
    depends_on:
      canvas-mongodb:
        condition: service_healthy

volumes:
  mongo-data:
