# MongoDB - Dev Services will auto-start a container in dev/test mode when no connection-string is set
quarkus.mongodb.database=canvas

# HTTP
quarkus.http.port=8080

# Serve React build from Quarkus (populated in frontend plan)
quarkus.http.root-path=/

# CORS for local development
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:5173

# Production: provide connection string via environment variable or prod profile
%prod.quarkus.mongodb.connection-string=mongodb://localhost:27017

# Test profile: Dev Services starts MongoDB container automatically (no connection-string set)
%test.quarkus.mongodb.database=canvas_test
%test.quarkus.mongodb.devservices.enabled=true

# Production override via environment variable
app.base-url=http://localhost:8080
